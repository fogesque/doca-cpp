# GPU-GPU throughput benchmark sample config

sample:
  # Off:0 Trace:1 Debug:2 Info:3 Warning:4 Error:5 Critical:6
  log-level: 1
  # Off:10 Trace:70 Debug:60 Info:50 Warning:40 Error:30 Critical:20
  doca-log-level: 40

  # Throughput measurement duration in seconds
  measurement-duration: 10

stream:
  # Number of buffers for streaming (3-128)
  num-buffers: 64
  # Buffer size in bytes (32 MB)
  buffer-size: 33554432

server:
  device: "mlx5_0"
  gpu-pcie-bdf: "4B:00.0"
  port: 54321

client:
  device: "mlx5_2"
  gpu-pcie-bdf: "4B:00.0"
  server-ipv4: "192.168.88.25"
  server-port: 54321
